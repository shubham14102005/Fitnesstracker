# ============================================================
# PostgreSQL / Neon.tech Database Configuration (Production)
# ============================================================
spring.datasource.url=jdbc:postgresql://ep-blue-mud-apre3sl6-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.driverClassName=org.postgresql.Driver
